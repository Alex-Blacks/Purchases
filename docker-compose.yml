version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: purchases-db
    restart: always
    environment:
      POSTGRES_DB: purchases
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: